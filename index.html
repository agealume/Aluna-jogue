<!DOCTYPE html>
<html lang="pt-ao">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aluna Platform | MVP v1.2</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // ─── CONSTANTES E DADOS (Extraídos do teu v1.2) ──────────────────────────
        const PROVINCES = ["Luanda","Benguela","Huambo","Huíla","Cabinda","Malanje","Uíge","Lunda Norte","Lunda Sul","Moxico","Cuando Cubango","Cunene","Namibe","Bié","Kwanza Norte","Kwanza Sul","Zaire","Bengo","Kuando","Icolo e Bengo"];
        const EDUCATION_LEVELS = ["Ensino Primário","7ª Classe","8ª Classe","9ª Classe","10ª Classe","11ª Classe","12ª Classe","Bacharel","Licenciatura","Mestrado","Doutoramento"];
        const QUESTIONS = [
            {q:"Qual é a capital de Angola?", opts:["Luanda","Benguela","Huambo","Malanje"], a:0},
            {q:"Em que ano Angola se tornou independente?", opts:["1972","1975","1980","1968"], a:1},
            {q:"Qual é a moeda oficial de Angola?", opts:["Real","Kwanza","Escudo","Franco"], a:1},
            {q:"Qual é o rio mais longo de Angola?", opts:["Kwanza","Congo","Cunene","Kubango"], a:0},
            {q:"Qual é o animal símbolo de Angola?", opts:["Leão","Palanca Negra","Elefante","Zebra"], a:1}
        ];
        const ADMIN_SECRET = "aluna2025";

        // ─── CSS COMPLETO ────────────────────────────────────────────────────────
        const css = `
            @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;600;700;800&display=swap');
            *{margin:0;padding:0;box-sizing:border-box;}
            :root{ --red:#CC1A1A;--gold:#F0A500;--yellow:#FFD700;--black:#0A0A0A;--surface:#111;--surface2:#1A1A1A;--surface3:#242424;--green:#00C97F;--white:#F5F5F0;--muted:#888;--border:#2A2A2A; }
            body{font-family:'Outfit',sans-serif;background:var(--black);color:var(--white);overflow-x:hidden;}
            .app{max-width:480px;margin:0 auto;min-height:100vh;background:var(--black);display:flex;flex-direction:column;border:1px solid var(--border);}
            .header{background:linear-gradient(135deg,#1a0505,var(--black));border-bottom:2px solid var(--gold);padding:16px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
            .logo{font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:3px;background:linear-gradient(135deg,var(--yellow),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
            .balance-pill{background:var(--surface2);border:1px solid var(--gold);border-radius:20px;padding:6px 14px;font-size:12px;font-weight:700;color:var(--gold);}
            .nav{display:flex;background:var(--surface);border-bottom:1px solid var(--border);overflow-x:auto;}
            .nav-btn{padding:12px 16px;font-size:11px;font-weight:700;text-transform:uppercase;border:none;background:none;color:var(--muted);cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;}
            .nav-btn.active{color:var(--gold);border-bottom-color:var(--gold);}
            .card{background:var(--surface2);border:1px solid var(--border);border-radius:16px;padding:20px;margin:15px;}
            .btn{padding:14px;border-radius:12px;font-weight:700;cursor:pointer;border:none;width:100%;transition:0.2s;}
            .btn-gold{background:linear-gradient(135deg,var(--yellow),var(--gold));color:var(--black);}
            .input{width:100%;background:var(--surface3);border:1px solid var(--border);border-radius:10px;padding:12px;color:white;margin:8px 0;}
            .q-opt{background:var(--surface3);border:1px solid var(--border);padding:12px;margin:8px 0;border-radius:8px;cursor:pointer;text-align:center;}
            .footer{background:var(--surface);padding:20px;text-align:center;border-top:1px solid var(--border);}
            .footer-brand{font-family:'Bebas Neue',sans-serif;color:var(--gold);font-size:18px;}
            .footer-text{font-size:10px;color:var(--muted);margin-top:5px;}
        `;

        // ─── COMPONENTES ─────────────────────────────────────────────────────────
        function App() {
            const [user, setUser] = useState(null);
            const [tab, setTab] = useState("home");
            const [currentQ, setCurrentQ] = useState(0);
            const [toast, setToast] = useState("");

            const showToast = (msg) => {
                setToast(msg);
                setTimeout(() => setToast(""), 3000);
            };

            if (!user) {
                return (
                    <div className="app">
                        <style>{css}</style>
                        <div style={{padding:"60px 20px", textAlign:"center"}}>
                            <h1 className="logo" style={{fontSize:70}}>Aluna</h1>
                            <p style={{color:"var(--muted)", marginBottom:40}}>CONHECIMENTO É A TUA MAIOR APOSTA</p>
                            <div className="card">
                                <h3 style={{marginBottom:15, fontFamily:'Bebas Neue'}}>Acesso do Aluno</h3>
                                <input className="input" placeholder="Teu E-mail" />
                                <input className="input" type="password" placeholder="Palavra-passe" />
                                <button className="btn btn-gold" onClick={() => setUser({name:"Kizua", balance:1500})}>ENTRAR NA ALUNA</button>
                            </div>
                        </div>
                    </div>
                );
            }

            return (
                <div className="app">
                    <style>{css}</style>
                    <header className="header">
                        <div>
                            <div className="logo">Aluna</div>
                            <div style={{fontSize:8, color:"var(--muted)"}}>GRUPO AGEA COMERCIAL</div>
                        </div>
                        <div className="balance-pill">💰 {user.balance.toLocaleString()} Kz</div>
                    </header>
                    
                    <nav className="nav">
                        {["home", "quiz", "ranking", "carteira", "admin"].map(t => (
                            <button key={t} className={`nav-btn ${tab===t?'active':''}`} onClick={()=>setTab(t)}>{t}</button>
                        ))}
                    </nav>

                    <main style={{flex:1}}>
                        {tab === "home" && (
                            <div className="card">
                                <h2>Bem-vindo, {user.name}! 🇦🇴</h2>
                                <p style={{color:"var(--muted)", marginTop:10}}>O teu conhecimento vale dinheiro. Começa um quiz ou desafia a Luma IA.</p>
                                <button className="btn btn-gold" style={{marginTop:20}} onClick={()=>setTab("quiz")}>DESAFIO DO DIA</button>
                            </div>
                        )}

                        {tab === "quiz" && (
                            <div className="card">
                                <span style={{color:"var(--gold)", fontWeight:800, fontSize:10}}>QUESTÃO {currentQ + 1} DE 5</span>
                                <h3 style={{margin:"20px 0"}}>{QUESTIONS[currentQ].q}</h3>
                                {QUESTIONS[currentQ].opts.map((opt, i) => (
                                    <div key={i} className="q-opt" onClick={() => {
                                        if(currentQ < 4) setCurrentQ(currentQ + 1);
                                        else { setCurrentQ(0); setTab("home"); showToast("Quiz Concluído! +200 Kz"); }
                                    }}>{opt}</div>
                                ))}
                            </div>
                        )}

                        {tab === "ranking" && (
                            <div className="card">
                                <h3 style={{fontFamily:'Bebas Neue', fontSize:22, marginBottom:15}}>Top Estudantes</h3>
                                {["Kizua Mbemba - 4500 pts", "Esperança Lopes - 3200 pts", "Carlos Teixeira - 2100 pts"].map((r, i) => (
                                    <div key={i} style={{padding:"12px 0", borderBottom:"1px solid #333", fontSize:14}}>{i+1}. {r}</div>
                                ))}
                            </div>
                        )}

                        {tab === "carteira" && (
                            <div className="card">
                                <h3>Minha Carteira</h3>
                                <div style={{background:"#222", padding:15, borderRadius:10, margin:"15px 0", textAlign:"center"}}>
                                    <span style={{fontSize:12, color:"#888"}}>Saldo Disponível</span>
                                    <div style={{fontSize:28, color:"var(--gold)", fontWeight:800}}>{user.balance} Kz</div>
                                </div>
                                <button className="btn btn-gold">LEVANTAR (Multicaixa)</button>
                            </div>
                        )}

                        {tab === "admin" && (
                            <div className="card" style={{border:"1px solid var(--red)"}}>
                                <h3>Área Restrita</h3>
                                <p style={{fontSize:12, color:"var(--muted)", marginBottom:15}}>Apenas para gestores do Grupo Agea.</p>
                                <input className="input" type="password" placeholder="Chave de Acesso" />
                                <button className="btn" style={{background:"#333", color:"white"}}>VALIDAR</button>
                            </div>
                        )}
                    </main>

                    <footer className="footer">
                        <div className="footer-brand">Aluna</div>
                        <div className="footer-text">937 876 711 · Luanda, Angola</div>
                    </footer>

                    {toast && <div style={{position:"fixed", bottom:20, left:"50%", transform:"translateX(-50%)", background:"var(--gold)", color:"black", padding:"10px 20px", borderRadius:20, fontWeight:700, fontSize:12}}>{toast}</div>}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
