<!DOCTYPE html>
<html lang="pt-ao">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aluna Platform | MVP v1.2</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // ─── TODAS AS TUAS CONSTANTES ORIGINAIS ───────────────────────────────────────
        const PROVINCES = ["Luanda","Benguela","Huambo","Huíla","Cabinda","Malanje","Uíge","Lunda Norte","Lunda Sul","Moxico","Cuando Cubango","Cunene","Namibe","Bié","Kwanza Norte","Kwanza Sul","Zaire","Bengo","Kuando","Icolo e Bengo"];
        const EDUCATION_LEVELS = ["Ensino Primário","7ª Classe","8ª Classe","9ª Classe","10ª Classe","11ª Classe","12ª Classe","Bacharel","Licenciatura","Mestrado","Doutoramento"];
        const BET_AMOUNTS_IA   = [100,200,300,500,1000,1500,2000,3000,5000];
        const QUESTIONS = [
            {q:"Qual é a capital de Angola?", opts:["Luanda","Benguela","Huambo","Malanje"], a:0},
            {q:"Em que ano Angola se tornou independente?", opts:["1972","1975","1980","1968"], a:1},
            {q:"Qual é a moeda oficial de Angola?", opts:["Real","Kwanza","Escudo","Franco"], a:1},
            {q:"Qual é o rio mais longo de Angola?", opts:["Kwanza","Congo","Cunene","Kubango"], a:0},
            {q:"Qual é o animal símbolo de Angola?", opts:["Leão","Palanca Negra","Elefante","Zebra"], a:1},
            {q:"Quem foi o primeiro presidente de Angola?", opts:["José Eduardo dos Santos","Agostinho Neto","João Lourenço","Holden Roberto"], a:1},
            {q:"Qual é a língua oficial de Angola?", opts:["Kimbundu","Kikongo","Português","Umbundu"], a:2},
            {q:"Quantas províncias tem Angola?", opts:["14","16","18","20"], a:2}
        ];
        const WIN_MSG = ["🏆 Você é um génio absoluto!","🔥 Impressionante! Angola te saúda!","⭐ Mente brilhante em ação!"];
        const LOSE_MSG = ["📚 Estude mais e volte mais forte!","💪 Os campeões não desistem!","🌱 Cada erro é uma lição valiosa!"];
        const ADMIN_SECRET = "aluna2025";
        const rnd = arr => arr[Math.floor(Math.random() * arr.length)];

        // ─── O TEU CSS ORIGINAL (DESIGN DE ELITE) ─────────────────────────────────────
        const css = `
        @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700;800&display=swap');
        *{margin:0;padding:0;box-sizing:border-box;}
        :root{ --red:#CC1A1A;--gold:#F0A500;--yellow:#FFD700;--black:#0A0A0A;--surface:#111;--surface2:#1A1A1A;--surface3:#242424;--green:#00C97F;--white:#F5F5F0;--muted:#888;--border:#2A2A2A; }
        body{font-family:'Outfit',sans-serif;background:var(--black);color:var(--white);overflow-x:hidden;}
        .app{max-width:480px;margin:0 auto;min-height:100vh;background:var(--black);position:relative;display:flex;flex-direction:column;border:1px solid var(--border);}
        .header{background:linear-gradient(135deg,#0d0000,#1a0505,var(--black));border-bottom:2px solid var(--gold);padding:16px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
        .logo{font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:3px;background:linear-gradient(135deg,var(--yellow),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
        .balance-pill{background:var(--surface2);border:1px solid var(--gold);border-radius:20px;padding:6px 14px;font-size:12px;font-weight:700;color:var(--gold);}
        .nav{display:flex;background:var(--surface);border-bottom:1px solid var(--border);overflow-x:auto;}
        .nav-btn{padding:12px 16px;font-size:11px;font-weight:700;text-transform:uppercase;border:none;background:none;color:var(--muted);cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;}
        .nav-btn.active{color:var(--gold);border-bottom-color:var(--gold);}
        .card{background:var(--surface2);border:1px solid var(--border);border-radius:16px;padding:20px;margin:16px;}
        .btn{padding:14px;border-radius:12px;font-weight:700;cursor:pointer;border:none;width:100%;transition:0.2s;display:flex;align-items:center;justify-content:center;gap:8px;}
        .btn-gold{background:linear-gradient(135deg,var(--yellow),var(--gold));color:var(--black);}
        .input{width:100%;background:var(--surface3);border:1px solid var(--border);border-radius:10px;padding:13px;color:white;margin:8px 0;outline:none;}
        .q-opt{background:var(--surface3);border:1px solid var(--border);padding:14px;margin:8px 0;border-radius:10px;cursor:pointer;transition:0.2s;}
        .q-opt:hover{border-color:var(--gold);}
        .toast{position:fixed;top:80px;left:50%;transform:translateX(-50%);background:var(--surface2);border:1px solid var(--gold);padding:10px 20px;border-radius:10px;z-index:1000;font-size:13px;animation:slideDown 0.3s;}
        @keyframes slideDown{from{top:60px;opacity:0}to{top:80px;opacity:1}}
        `;

        function App() {
            const [user, setUser] = useState(null);
            const [tab, setTab] = useState("Início");
            const [toast, setToast] = useState("");
            const [currentQ, setCurrentQ] = useState(0);

            const showToast = (msg) => {
                setToast(msg);
                setTimeout(() => setToast(""), 3000);
            };

            // TELA DE LOGIN (COM A ALMA DO TEU PROJETO)
            if (!user) {
                return (
                    <div className="app">
                        <style>{css}</style>
                        <div style={{padding:"60px 20px", textAlign:"center"}}>
                            <h1 className="logo" style={{fontSize:70}}>Aluna</h1>
                            <p style={{color:"#888", marginBottom:40, letterSpacing:2}}>CONHECIMENTO · PODER · VITÓRIA</p>
                            <div className="card" style={{textAlign:"left"}}>
                                <label style={{fontSize:11, color:"#888"}}>E-MAIL</label>
                                <input className="input" placeholder="teu@email.com" />
                                <label style={{fontSize:11, color:"#888"}}>SENHA</label>
                                <input className="input" type="password" placeholder="••••••••" />
                                <button className="btn btn-gold" onClick={() => setUser({name:"Kizua Mbemba", balance:1500, level:"12ª Classe"})}>ENTRAR NA ALUNA</button>
                            </div>
                        </div>
                    </div>
                );
            }

            return (
                <div className="app">
                    <style>{css}</style>
                    <header className="header">
                        <div>
                            <div className="logo">Aluna</div>
                            <div style={{fontSize:8, color:"#888", letterSpacing:2}}>GRUPO AGEA COMERCIAL</div>
                        </div>
                        <div className="balance-pill">💰 {user.balance.toLocaleString()} Kz</div>
                    </header>

                    <nav className="nav">
                        {["Início", "Quiz", "Ranking", "Carteira", "Admin"].map(t => (
                            <button key={t} className={`nav-btn ${tab===t?'active':''}`} onClick={()=>setTab(t)}>{t}</button>
                        ))}
                    </nav>

                    <main style={{flex:1}}>
                        {tab === "Início" && (
                            <div className="card">
                                <h2>Bem-vindo, {user.name.split(' ')[0]}!</h2>
                                <p style={{color:"#888", marginTop:10, fontSize:14}}>Nível: {user.level}</p>
                                <div style={{marginTop:20, padding:15, background:"#222", borderRadius:12, borderLeft:"4px solid var(--gold)"}}>
                                    <p style={{fontSize:13, fontStyle:"italic"}}>"O conhecimento é a única riqueza que ninguém pode roubar."</p>
                                </div>
                                <button className="btn btn-gold" style={{marginTop:20}} onClick={()=>setTab("Quiz")}>JOGAR AGORA</button>
                            </div>
                        )}

                        {tab === "Quiz" && (
                            <div className="card">
                                <p style={{color:"var(--gold)", fontSize:11, fontWeight:800}}>PERGUNTA {currentQ + 1}</p>
                                <h3 style={{margin:"15px 0", lineHeight:1.4}}>{QUESTIONS[currentQ].q}</h3>
                                {QUESTIONS[currentQ].opts.map((opt, i) => (
                                    <div key={i} className="q-opt" onClick={() => {
                                        if(i === QUESTIONS[currentQ].a) showToast("✅ Resposta Correta!");
                                        else showToast("❌ Errado! Tenta a próxima.");
                                        setCurrentQ((currentQ + 1) % QUESTIONS.length);
                                    }}>{opt}</div>
                                ))}
                            </div>
                        )}

                        {tab === "Ranking" && (
                            <div className="card">
                                <h3 style={{fontFamily:'Bebas Neue', fontSize:24, marginBottom:15}}>Elite da Semana 🇦🇴</h3>
                                {["Kizua Mbemba", "Esperança Lopes", "Carlos Teixeira"].map((n, i) => (
                                    <div key={i} style={{display:"flex", justifyContent:"space-between", padding:"12px 0", borderBottom:"1px solid #222"}}>
                                        <span style={{fontSize:14}}>{i+1}. {n}</span>
                                        <span style={{color:"var(--gold)", fontWeight:700}}>{5000 - (i*1000)} pts</span>
                                    </div>
                                ))}
                            </div>
                        )}

                        {tab === "Carteira" && (
                            <div className="card">
                                <h3>Minha Carteira</h3>
                                <div style={{background:"linear-gradient(135deg, #111, #222)", padding:20, borderRadius:15, margin:"20px 0", border:"1px solid #333"}}>
                                    <p style={{fontSize:12, color:"#888"}}>Saldo Total</p>
                                    <h2 style={{fontSize:32, color:"var(--gold)"}}>{user.balance.toLocaleString()} Kz</h2>
                                </div>
                                <button className="btn btn-gold">LEVANTAR VIA MULTICAIXA</button>
                                <button className="btn" style={{background:"#222", color:"white", marginTop:10}}>HISTÓRICO</button>
                            </div>
                        )}

                        {tab === "Admin" && (
                            <div className="card" style={{borderColor:"var(--red)"}}>
                                <h3>Painel Administrativo</h3>
                                <p style={{fontSize:12, color:"#888", marginBottom:20}}>Acesso restrito para gestão de levantamentos.</p>
                                <input className="input" type="password" placeholder="Senha Mestra" />
                                <button className="btn" style={{background:"var(--red)", color:"white"}}>AUTENTICAR</button>
                            </div>
                        )}
                    </main>

                    {toast && <div className="toast">{toast}</div>}
                    
                    <footer style={{padding:20, textAlign:"center", fontSize:10, color:"#444"}}>
                        <p>ALUNA PLATFORM v1.2 · GRUPO AGEA COMERCIAL</p>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
