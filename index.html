<!DOCTYPE html>
<html lang="pt-ao">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aluna Platform | MVP v1.2</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // ─── CONSTANTES RICAS (A ALMA DO PROJETO) ───────────────────────────────────
        const WIN_MSG  = ["🏆 Você é um génio absoluto!","🔥 Impressionante! Angola te saúda!","⭐ Mente brilhante em ação!","💎 Conhecimento é poder!","🚀 Imparável! Continue assim!"];
        const LOSE_MSG = ["📚 Estude mais e volte mais forte!","💪 Os campeões não desistem!","🌱 Cada erro é uma lição valiosa!","🔄 Tente novamente — você consegue!","🎯 O conhecimento te espera!"];
        const QUESTIONS = [
            {q:"Qual é a capital de Angola?", opts:["Luanda","Benguela","Huambo","Malanje"], a:0},
            {q:"Em que ano Angola se tornou independente?", opts:["1972","1975","1980","1968"], a:1},
            {q:"Qual é a moeda oficial de Angola?", opts:["Real","Kwanza","Escudo","Franco"], a:1},
            {q:"Qual é o rio mais longo de Angola?", opts:["Kwanza","Congo","Cunene","Kubango"], a:0},
            {q:"Qual é o animal símbolo de Angola?", opts:["Leão","Palanca Negra","Elefante","Zebra"], a:1}
        ];

        // ─── CSS COMPLETO COM ANIMAÇÕES E EFEITOS FINOS ──────────────────────────────
        const css = `
        @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700;800&display=swap');
        *{margin:0;padding:0;box-sizing:border-box;}
        :root{ --red:#CC1A1A;--gold:#F0A500;--yellow:#FFD700;--black:#0A0A0A;--surface:#111;--surface2:#1A1A1A;--surface3:#242424;--green:#00C97F;--white:#F5F5F0;--muted:#888;--border:#2A2A2A; }
        body{font-family:'Outfit',sans-serif;background:var(--black);color:var(--white);overflow-x:hidden;}
        .app{max-width:480px;margin:0 auto;min-height:100vh;background:var(--black);display:flex;flex-direction:column;border:1px solid var(--border);position:relative;}
        
        /* Efeitos de Design */
        .logo{font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:3px;background:linear-gradient(135deg,var(--yellow),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
        .card{background:var(--surface2);border:1px solid var(--border);border-radius:16px;padding:20px;margin:16px;transition:0.3s;}
        .card-gold{border-color:var(--gold);box-shadow: 0 0 15px rgba(240,165,0,0.1);}
        
        .btn{padding:14px;border-radius:12px;font-weight:700;cursor:pointer;border:none;width:100%;transition:all 0.2s;display:flex;align-items:center;justify-content:center;gap:8px;}
        .btn-gold{background:linear-gradient(135deg,var(--yellow),var(--gold));color:var(--black);}
        .btn-gold:active{transform:scale(0.96);box-shadow:0 0 20px rgba(240,165,0,0.3);}
        
        /* Animações */
        .pulse{animation:pulse 2s infinite;}
        @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(240,165,0,0.4);} 70%{box-shadow:0 0 0 10px rgba(240,165,0,0);} 100%{box-shadow:0 0 0 0 rgba(240,165,0,0);}}
        
        .result-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.9);display:flex;align-items:center;justify-content:center;z-index:1000;padding:20px;animation:fadeIn 0.3s;}
        @keyframes fadeIn{from{opacity:0;} to{opacity:1;}}
        
        .q-opt{background:var(--surface3);border:1.5px solid var(--border);border-radius:12px;padding:16px;margin:10px 0;cursor:pointer;transition:0.2s;font-weight:500;}
        .q-opt:hover{border-color:var(--gold);background:rgba(240,165,0,0.05);}
        
        /* Abas e Header */
        .header{background:linear-gradient(135deg,#0d0000,#1a0505,var(--black));border-bottom:2px solid var(--gold);padding:16px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
        .nav{display:flex;background:var(--surface);border-bottom:1px solid var(--border);overflow-x:auto;}
        .nav-btn{padding:14px 18px;font-size:11px;font-weight:700;text-transform:uppercase;color:var(--muted);background:none;border:none;cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;}
        .nav-btn.active{color:var(--gold);border-bottom-color:var(--gold);}
        
        .toast{position:fixed;top:80px;left:50%;transform:translateX(-50%);background:var(--surface2);border:1px solid var(--gold);padding:12px 24px;border-radius:12px;font-size:13px;font-weight:600;z-index:2000;box-shadow:0 10px 30px rgba(0,0,0,0.5);}
        `;

        function App() {
            const [user, setUser] = useState(null);
            const [tab, setTab] = useState("Início");
            const [currentQ, setCurrentQ] = useState(0);
            const [toast, setToast] = useState("");
            const [result, setResult] = useState(null); // Para o overlay de vitória/derrota

            const showToast = (msg) => {
                setToast(msg);
                setTimeout(() => setToast(""), 3000);
            };

            const handleAnswer = (index) => {
                if(index === QUESTIONS[currentQ].a) {
                    setResult({win: true, msg: WIN_MSG[Math.floor(Math.random()*WIN_MSG.length)]});
                } else {
                    setResult({win: false, msg: LOSE_MSG[Math.floor(Math.random()*LOSE_MSG.length)]});
                }
            };

            if (!user) {
                return (
                    <div className="app">
                        <style>{css}</style>
                        <div style={{padding:"60px 20px", textAlign:"center"}}>
                            <h1 className="logo" style={{fontSize:80, marginBottom:10}}>Aluna</h1>
                            <p style={{color: "var(--muted)", letterSpacing: 4, fontSize: 10, fontWeight: 700}}>GRUPO AGEA COMERCIAL</p>
                            <div className="card" style={{marginTop: 40, textAlign: "left", border: "1px solid #333"}}>
                                <h3 style={{fontFamily:'Bebas Neue', fontSize:24, color: 'var(--gold)', marginBottom: 20}}>Entrar na Arena</h3>
                                <input className="input" style={{width:'100%', background:'#222', border:'1px solid #333', padding:14, borderRadius:10, color:'white', marginBottom:15}} placeholder="E-mail do Aluno" />
                                <input className="input" type="password" style={{width:'100%', background:'#222', border:'1px solid #333', padding:14, borderRadius:10, color:'white', marginBottom:20}} placeholder="Senha" />
                                <button className="btn btn-gold pulse" onClick={() => setUser({name:"Kizua Mbemba", balance:1500})}>INICIAR SESSÃO</button>
                            </div>
                        </div>
                    </div>
                );
            }

            return (
                <div className="app">
                    <style>{css}</style>
                    <header className="header">
                        <div>
                            <div className="logo">Aluna</div>
                            <div style={{fontSize:8, color: "var(--muted)", letterSpacing:2}}>CONHECIMENTO É PODER</div>
                        </div>
                        <div style={{background:'rgba(240,165,0,0.1)', border:'1px solid var(--gold)', padding:'6px 12px', borderRadius:20, color:'var(--gold)', fontWeight:800, fontSize:13}}>
                            💰 {user.balance.toLocaleString()} Kz
                        </div>
                    </header>
                    
                    <nav className="nav">
                        {["Início", "Quiz", "Ranking", "Carteira", "Admin"].map(t => (
                            <button key={t} className={`nav-btn ${tab===t?'active':''}`} onClick={()=>setTab(t)}>{t}</button>
                        ))}
                    </nav>

                    <main style={{flex:1}}>
                        {tab === "Início" && (
                            <div className="card card-gold">
                                <h2 style={{fontSize:24}}>Saudações, {user.name.split(' ')[0]}!</h2>
                                <p style={{color:"var(--muted)", marginTop:10, lineHeight:1.6}}>Hoje é um excelente dia para testar os teus conhecimentos e aumentar o teu saldo.</p>
                                <div style={{marginTop:25, display:'grid', gridTemplateColumns:'1fr 1fr', gap:10}}>
                                    <div style={{background:'#222', padding:15, borderRadius:12, textAlign:'center', border:'1px solid #333'}}>
                                        <div style={{color:'var(--gold)', fontSize:20, fontWeight:800}}>12</div>
                                        <div style={{fontSize:9, color:'#888', textTransform:'uppercase'}}>Vitórias</div>
                                    </div>
                                    <div style={{background:'#222', padding:15, borderRadius:12, textAlign:'center', border:'1px solid #333'}}>
                                        <div style={{color:'var(--red)', fontSize:20, fontWeight:800}}>4</div>
                                        <div style={{fontSize:9, color:'#888', textTransform:'uppercase'}}>Derrotas</div>
                                    </div>
                                </div>
                                <button className="btn btn-gold" style={{marginTop:20}} onClick={()=>setTab("Quiz")}>JOGAR QUIZ (100 Kz)</button>
                            </div>
                        )}

                        {tab === "Quiz" && (
                            <div className="card">
                                <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:20}}>
                                    <span style={{color:"var(--gold)", fontSize:11, fontWeight:800, letterSpacing:1}}>QUESTÃO {currentQ + 1}/5</span>
                                    <span style={{background:'#333', padding:'4px 10px', borderRadius:10, fontSize:10}}>⏳ 15s</span>
                                </div>
                                <h3 style={{fontSize:20, marginBottom:20, lineHeight:1.4}}>{QUESTIONS[currentQ].q}</h3>
                                {QUESTIONS[currentQ].opts.map((opt, i) => (
                                    <div key={i} className="q-opt" onClick={() => handleAnswer(i)}>{opt}</div>
                                ))}
                            </div>
                        )}

                        {/* ... outras abas mantendo o estilo premium ... */}
                    </main>

                    {result && (
                        <div className="result-overlay">
                            <div style={{background:'var(--surface2)', padding:40, borderRadius:24, textAlign:'center', border:`2px solid ${result.win?'var(--gold)':'var(--red)'}`, maxWidth:340, width:'100%'}}>
                                <div style={{fontSize:60, marginBottom:20}}>{result.win ? '🏆' : '📚'}</div>
                                <h2 style={{fontFamily:'Bebas Neue', fontSize:28, letterSpacing:2}}>{result.win ? 'VITÓRIA!' : 'NÃO FOI DESTA'}</h2>
                                <p style={{color:'#888', margin:'15px 0', fontSize:14}}>{result.msg}</p>
                                <button className="btn btn-gold" onClick={() => {
                                    setResult(null);
                                    if(currentQ < 4) setCurrentQ(currentQ+1); else {setCurrentQ(0); setTab("Início");}
                                }}>{result.win ? 'CONTINUAR' : 'TENTAR NOVAMENTE'}</button>
                            </div>
                        </div>
                    )}

                    {toast && <div className="toast">{toast}</div>}
                    
                    <footer style={{padding:30, textAlign:"center", borderTop:'1px solid #222'}}>
                        <div className="logo" style={{fontSize:20, opacity:0.5}}>Aluna</div>
                        <p style={{fontSize:9, color:"#444", marginTop:10}}>© 2026 GRUPO AGEA COMERCIAL · ANGOLA</p>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
